name: Bug report
description: Report broken or unexpected behavior in Hemingway
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for us to reproduce.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear one-paragraph description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start Hemingway with...
        2. Open page...
        3. Click...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Hemingway version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, framework, browser.
      placeholder: macOS 14, Node 20, Next.js 15, Chrome 123
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant terminal/browser logs.
      render: shell

