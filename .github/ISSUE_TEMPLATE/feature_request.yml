name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please frame requests in terms of user outcome and workflow impact.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem is not solved today?
      placeholder: As a user, I cannot...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Hemingway do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternative approach?

  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How should we measure that this is successful?
      placeholder: Users can... in under... with...

